{% extends 'core/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: 75vh;">
    <div style="background: #1f1f1f; padding: 30px; border-radius: 8px; border: 1px solid #333; width: 400px;">
        <h2 style="margin-top: 0; color: #fff;">Register</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; padding: 10px; background: #ff3366; border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px;">Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}
