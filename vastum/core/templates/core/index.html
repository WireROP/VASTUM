<header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
    <a href="{% url 'video_list' %}" class="text-xl font-bold text-red-500">VideoPlatform</a>
    
    <form method="GET" action="{% url 'video_list' %}" class="flex gap-2">
        <input type="text" name="q" value="{{ query }}" placeholder="Search videos..." class="bg-gray-700 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
        <button type="submit" class="bg-red-600 px-4 py-2 rounded hover:bg-red-700 transition">Search</button>
    </form>

    <div class="flex items-center gap-4">
        {% if user.is_authenticated %}
            <span class="text-sm text-gray-300">Hello, {{ user.username }}</span>
            <a href="{% url 'upload_video' %}" class="bg-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-700 transition">Upload</a>
            <a href="{% url 'monero_pay' %}" class="bg-yellow-600 px-3 py-1 rounded text-sm hover:bg-yellow-700 transition">Fund with XMR</a>
            <form action="{% url 'logout' %}" method="POST" class="inline">
                {% csrf_token %}
                <button type="submit" class="bg-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-600 transition">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="text-sm text-gray-300 hover:text-white">Login</a>
            <a href="{% url 'register' %}" class="bg-red-600 px-3 py-1 rounded text-sm hover:bg-red-700 transition">Register</a>
        {% endif %}
    </div>
</header>
