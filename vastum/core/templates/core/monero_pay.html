{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: #1f1f1f; padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: center;">
    <h2 style="color: #ff3366;">Fund with Monero (XMR)</h2>
    <p style="color: #ccc; font-size: 14px;">Send your XMR contribution or payment securely to the platform address below:</p>
    <div style="background: #121212; padding: 15px; border: 1px dashed #444; word-break: break-all; font-family: monospace; color: #fff; margin: 20px 0; border-radius: 4px;">
        {{ monero_address }}
    </div>
    <p style="font-size: 12px; color: #888;">Payments are verified automatically via network confirmation.</p>
</div>
{% endblock %}
