{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: #1f1f1f; padding: 30px; border-radius: 8px; border: 1px solid #333;">
    <h2 style="margin-top: 0; color: #fff;">Upload Video</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 10px 20px; background: #ff3366; border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px;">Upload Video</button>
    </form>
</div>
{% endblock %}
