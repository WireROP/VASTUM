<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Upload Video</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <form method="POST" enctype="multipart/form-data" class="bg-gray-800 p-8 rounded shadow-md w-[450px] flex flex-col gap-4">
        {% csrf_token %}
        <h2 class="text-xl font-bold">Upload Video</h2>
        {{ form.as_p }}
        <button type="submit" class="bg-blue-600 py-2 rounded font-semibold">Upload</button>
    </form>
</body>
</html>
