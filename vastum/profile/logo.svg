<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Deep Pitch Black Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030303"/>
      <stop offset="50%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Metallic Silver Gradients -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="30%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="silverText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Silver Glow Filter -->
    <filter id="silverGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Typography: ONLY VASTUM (Centered) -->
  <text x="600" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="900" fill="url(#silverText)" letter-spacing="24" text-anchor="middle" filter="url(#silverGlow)">
    VASTUM
  </text>

  <!-- Clean Metallic Borders -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="url(#silverGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="398" x2="1200" y2="398" stroke="url(#silverGrad)" stroke-width="2" opacity="0.5"/>
</svg>
